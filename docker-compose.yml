services:
  # --- Bases de données PostgreSQL ---
  patient-db:
    image: postgres:15
    container_name: patient-db
    environment:
      POSTGRES_DB: patientdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - patient-data:/var/lib/postgresql/data
    networks:
      - myheart-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d patientdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  appointment-db:
    image: postgres:15
    container_name: appointment-db
    environment:
      POSTGRES_DB: appointmentdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - appointment-data:/var/lib/postgresql/data
    networks:
      - myheart-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d appointmentdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  billing-db:
    image: postgres:15
    container_name: billing-db
    environment:
      POSTGRES_DB: billingdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - billing-data:/var/lib/postgresql/data
    networks:
      - myheart-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d billingdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- NOUVEAU : Pharmacy Database ---
  pharmacy-db:
    image: postgres:15
    container_name: pharmacy-db
    environment:
      POSTGRES_DB: pharmacydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5435:5432"
    volumes:
      - pharmacy-data:/var/lib/postgresql/data
    networks:
      - myheart-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d pharmacydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Bases de données MongoDB ---
  ehr-db:
    image: mongo:6
    container_name: ehr-db
    ports:
      - "27017:27017"
    volumes:
      - ehr-data:/data/db
    networks:
      - myheart-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  lab-db:
    image: mongo:6
    container_name: lab-db
    ports:
      - "27018:27017"
    volumes:
      - lab-data:/data/db
    networks:
      - myheart-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Microservices Spring Boot ---
  patient-service:
    build: ./backend/patient-service
    container_name: patient-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://patient-db:5432/patientdb
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      patient-db:
        condition: service_healthy
    networks:
      - myheart-network

  appointment-service:
    build: ./backend/appointment-service
    container_name: appointment-service
    ports:
      - "8082:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://appointment-db:5432/appointmentdb
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      appointment-db:
        condition: service_healthy
    networks:
      - myheart-network

  billing-service:
    build: ./backend/billing-service
    container_name: billing-service
    ports:
      - "8083:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://billing-db:5432/billingdb
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      billing-db:
        condition: service_healthy
    networks:
      - myheart-network

  # --- NOUVEAU : Pharmacy Service ---
  pharmacy-service:
    build: ./backend/pharmacy-service
    container_name: pharmacy-service
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://pharmacy-db:5432/pharmacydb
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      pharmacy-db:
        condition: service_healthy
    networks:
      - myheart-network

  # --- Microservices Node.js ---
  ehr-service:
    build: ./backend/ehr-service
    container_name: ehr-service
    ports:
      - "8084:8084"
    depends_on:
      ehr-db:
        condition: service_healthy
    networks:
      - myheart-network

  lab-service:
    build: ./backend/lab-service
    container_name: lab-service
    ports:
      - "8085:8085"
    depends_on:
      lab-db:
        condition: service_healthy
    networks:
      - myheart-network

networks:
  myheart-network:
    driver: bridge

volumes:
  patient-data:
  appointment-data:
  billing-data:
  pharmacy-data:  # NOUVEAU volume
  ehr-data:
  lab-data: