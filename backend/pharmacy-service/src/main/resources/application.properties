# Configuration PostgreSQL avec Docker (port 5435)
spring.datasource.url=jdbc:postgresql://localhost:5435/pharmacy-db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server port
server.port=8087

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFOserver.address=0.0.0.0

# Forcer l'écoute sur toutes les interfaces
server.address=0.0.0.0
server.port=8087
